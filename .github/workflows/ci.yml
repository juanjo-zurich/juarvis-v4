name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  CI: "true"
  JUARVIS_SKIP_NETWORK: "true"

jobs:
  # 1. Build + Tests + Verify (todo en uno para simplicidad)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: make build

      - name: Run Unit Tests
        run: go test -timeout 60s -cover ./...

      - name: Run Juarvis Verify
        run: ./juarvis verify

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # 2. Linting (separado porque puede fallar independientemente)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt issues found:"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golint
        run: |
          which golangci-lint && golangci-lint run ./... || echo "golangci-lint not installed, skipping"
